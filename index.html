        }
        else if (h.includes("manque d'argent")) {
            if (topLabel.toUpperCase() === "JAMAIS") text = `Heureusement, ${topPct}% des femmes ne manquent jamais d'argent pour des protections.`;
            else text = `Le facteur économique est critique : ${topPct}% déclarent manquer d'argent. Cela force l'usage de méthodes peu hygiéniques (tissu).`;
        }
        else {
            // Générique intelligent
            if (diversity > 5) {
                text = `Les réponses sont très diversifiées (${diversity} catégories différentes). Toutefois, ${highlight(topLabel)} ressort comme la tendance principale (${topCount} mentions).`;
            } else {
                text = `Il existe un relatif consensus. ${highlight(topLabel)} est la réponse dominante, citée par ${topPct}% des répondantes.`;
            }
        }

        return text;
    }

    // --- 3. LOGIQUE DE RENDU ---
    const grid = document.getElementById('grid');
    const totalRespondents = rawData.length;
    let chartInstances = [];
    
    // Palette Pro
    const proPalette = ['#1e293b', '#3b82f6', '#0f766e', '#d97706', '#dc2626', '#64748b', '#7c3aed', '#db2777'];

    headers.forEach((header, index) => {
        const key = keyMap[index];
        if (!key) return;

        // Traitement données
        const columnData = rawData.map(row => row[key]).filter(val => val && val !== "*");
        const counts = {};
        columnData.forEach(val => {
            if (val.includes(',')) {
                val.split(',').forEach(p => { const c = p.trim(); if(c) counts[c] = (counts[c] || 0) + 1; });
            } else {
                const c = val.trim(); if(c) counts[c] = (counts[c] || 0) + 1;
            }
        });

        let labels = Object.keys(counts);
        let data = Object.values(counts);

        // Limiter visuel si trop de catégories
        if (labels.length > 8) {
            const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 8);
            labels = []; data = [];
            sorted.forEach(e => { labels.push(e[0]); data.push(e[1]); });
        }

        // Type Graphique
        let chartType = 'bar';
        if (labels.length <= 4) chartType = 'doughnut';

        // Génération HTML
        const card = document.createElement('div');
        card.className = 'card';
        
        const descriptionHTML = getDescription(header, labels, data, totalRespondents);

        card.innerHTML = `
            <div class="card-header">
                <h3>${index + 1}. ${header}</h3>
            </div>
            <div class="card-body">
                <div class="analysis-box">
                    <p class="analysis-text">${descriptionHTML}</p>
                </div>
                <div class="chart-container">
                    <canvas id="chart_${index}"></canvas>
                </div>
            </div>
            <div class="card-footer">
                <button class="btn-sm" onclick="copyChart('chart_${index}')">📋 Copier</button>
                <button class="btn-sm" onclick="downloadChart('chart_${index}')">⬇️ Télécharger</button>
            </div>
        `;
        grid.appendChild(card);

        // Chart.js
        const ctx = document.getElementById(`chart_${index}`).getContext('2d');
        const bgColors = data.map((_, i) => proPalette[i % proPalette.length]);

        const newChart = new Chart(ctx, {
            type: chartType,
            data: {
                labels: labels,
                datasets: [{
                    label: 'Réponses',
                    data: data,
                    backgroundColor: chartType === 'bar' ? '#3b82f6' : bgColors,
                    borderColor: '#ffffff',
                    borderWidth: 2,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: labels.length > 4 ? 'y' : 'x',
                plugins: {
                    legend: { display: chartType === 'doughnut', position: 'right', labels: { font: { family: 'Inter' }, usePointStyle: true } },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        titleFont: { family: 'Inter', weight: 'bold' },
                        bodyFont: { family: 'Inter' },
                        padding: 12,
                        cornerRadius: 8
                    }
                },
                scales: chartType === 'bar' ? {
                    x: { grid: { display: false }, ticks: { font: { family: 'Inter' } } },
                    y: { grid: { color: '#e2e8f0' }, border: { display: false } }
                } : {}
            }
        });
        chartInstances.push(newChart);
    });

    // --- 4. FONCTIONS GLOBALES ---
    function changeGlobalFont(fontFamily) {
        document.body.style.fontFamily = fontFamily;
        Chart.defaults.font.family = fontFamily;
        chartInstances.forEach(c => c.update());
        showToast("Police changée en " + fontFamily);
    }

    function downloadChart(id) {
        const canvas = document.getElementById(id);
        const link = document.createElement('a');
        link.download = `Analyse_${id}.png`;
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
    }

    function copyChart(id) {
        const canvas = document.getElementById(id);
        canvas.toBlob(blob => {
            try {
                navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                showToast("Graphique copié !");
            } catch (e) { alert("Copie non supportée par ce navigateur."); }
        });
    }

    async function downloadAllZip() {
        const zip = new JSZip();
        const folder = zip.folder("Memoire_Savalou_Charts");
        showToast("Compression en cours...");
        
        for (let i = 0; i < chartInstances.length; i++) {
            const canvas = document.getElementById(`chart_${i}`);
            if(canvas) {
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                folder.file(`${i+1}_${headers[i].substring(0,20).replace(/[^a-z0-9]/gi,'_')}.png`, blob);
            }
        }
        zip.generateAsync({type:"blob"}).then(c => saveAs(c, "Memoire_Complet_Analyse.zip"));
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.className = "show";
        setTimeout(() => t.className = t.className.replace("show", ""), 3000);
    }
</script>
