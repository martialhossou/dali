<style>
:root{
  --navy-900:#0a1e3d;
  --navy-800:#0f2c54;
  --blue-700:#154a8a;
  --blue-600:#1c5fae;
  --blue-500:#2b78d6;
  --blue-300:#7fb0e8;
  --blue-100:#e4edf9;
  --blue-050:#f3f7fd;
  --paper:#ffffff;
  --ink:#0e2038;
  --ink-soft:#3c4a5e;
  --gold:#a8801f;
  --line:#c9d8ec;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Times New Roman', Times, Georgia, serif;
  background:var(--navy-900);
  color:var(--ink);
  overflow:hidden;
}
.deck{ position:relative; width:100vw; height:100vh; }

.slide{
  position:absolute; inset:0;
  display:flex; flex-direction:column; justify-content:center;
  background:var(--paper);
  opacity:0; visibility:hidden; transform:translateY(14px);
  transition:opacity .4s ease, transform .4s ease, visibility .4s;
}
.slide.active{ opacity:1; visibility:visible; transform:translateY(0); }

/* --- cadre academique (frame) pour les diapositives claires --- */
.slide.framed{ padding:5.2vh 7.4vw 6.4vh; }
.slide.framed::before{
  content:""; position:absolute; inset:14px;
  border:1px solid var(--blue-300);
  pointer-events:none;
}
.slide.framed::after{
  content:""; position:absolute; inset:18px;
  border:1px solid var(--blue-100);
  pointer-events:none;
}
.corner{ position:absolute; width:24px; height:24px; pointer-events:none; z-index:2; }
.corner svg{width:100%;height:100%;}
.corner.tl{ top:23px; left:23px; }
.corner.tr{ top:23px; right:23px; transform:rotate(90deg); }
.corner.bl{ bottom:23px; left:23px; transform:rotate(-90deg); }
.corner.br{ bottom:23px; right:23px; transform:rotate(180deg); }

/* --- chrome --- */
.eyebrow{
  display:flex; align-items:baseline; gap:.6rem;
  font-size:.95rem; letter-spacing:.05em; text-transform:uppercase;
  color:var(--blue-700); font-weight:700; margin-bottom:.9rem;
  border-bottom:1px solid var(--line); padding-bottom:.5rem;
}
.eyebrow .roman{ color:var(--gold); font-weight:700; }
.slide-foot{
  position:absolute; left:7.4vw; right:7.4vw; bottom:2.6vh;
  display:flex; justify-content:space-between; align-items:center;
  font-size:.76rem; color:var(--ink-soft); letter-spacing:.02em;
  font-style:italic;
}
.slide-foot .pageno{
  font-style:normal; font-weight:700; color:var(--blue-700);
  background:var(--blue-050); border:1px solid var(--line);
  padding:.15rem .6rem; letter-spacing:.03em;
}
.progress-rail{ position:fixed; left:0; top:0; height:3px; width:100%; background:rgba(255,255,255,.1); z-index:50; }
.progress-bar{ height:100%; background:linear-gradient(90deg,var(--blue-500),var(--gold)); width:0%; transition:width .4s ease; }
.counter{
  position:fixed; right:24px; top:14px; z-index:50;
  color:#dfe9f8; font-size:.78rem; letter-spacing:.05em;
  background:rgba(255,255,255,.1); padding:4px 12px; border-radius:3px;
}
.nav-btn{
  position:fixed; top:50%; transform:translateY(-50%); z-index:50;
  width:42px; height:42px; border-radius:50%; border:1px solid rgba(255,255,255,.25);
  background:rgba(10,30,61,.5); color:#eaf1fb; font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:.2s;
  font-family:Georgia, serif;
}
.nav-btn:hover{ background:var(--blue-600); border-color:var(--blue-600); }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }

h1,h2,h3{ font-family:'Times New Roman', Times, serif; color:var(--navy-900); font-weight:700; }

/* ---------- COVER (Bienvenue) ---------- */
.slide-cover{ background:linear-gradient(150deg,var(--navy-900) 0%, var(--blue-700) 100%); align-items:center; text-align:center; }
.slide-cover *{ color:#f3f7fd; }
.slide-cover .kicker{ font-size:.9rem; letter-spacing:.26em; text-transform:uppercase; color:var(--blue-300); margin-bottom:1.6rem; }
.slide-cover h1{ font-size:2.9rem; color:#fff; letter-spacing:.02em; margin-bottom:1.8rem; }
.slide-cover .rule{ width:100px; height:1px; background:var(--gold); margin:0 auto 1.8rem; }
.slide-cover .names{ font-size:1.5rem; font-weight:700; color:#fff; }
.slide-cover .amp{ color:var(--gold); font-size:1.15rem; margin:.55rem 0; }
.slide-cover .foot{ position:absolute; bottom:4vh; left:0; right:0; font-size:.82rem; letter-spacing:.06em; color:var(--blue-300); }

/* ---------- TITLE (theme) ---------- */
.slide-title{ background:linear-gradient(150deg,var(--navy-900) 0%, var(--blue-700) 100%); align-items:center; text-align:center; }
.slide-title *{ color:#f3f7fd; }
.slide-title .instit{ font-size:.86rem; letter-spacing:.13em; text-transform:uppercase; color:var(--blue-300); margin-bottom:.35rem; }
.slide-title .theme-label{ font-size:.92rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); margin:1.6rem 0 1.1rem; }

.slide-title .rule{ width:100px; height:1px; background:var(--blue-300); margin:0 auto 1.4rem; }
.slide-title .foot{ position:absolute; bottom:4vh; left:0; right:0; font-size:.86rem; color:var(--blue-300); letter-spacing:.03em; }

/* ---------- CONTENT GENERIC ---------- */
.slide-content h2{ font-size:1.95rem; margin-bottom:1.4rem; max-width:940px; line-height:1.28; }

.body-text p{ font-size:1.08rem; line-height:1.62; color:var(--ink-soft); margin-bottom:.85rem; text-align:justify; }
.body-text strong{ color:var(--navy-900); }
ul.points{ list-style:none; }
ul.points li{ position:relative; padding-left:1.5rem; margin-bottom:.68rem; font-size:1.02rem; line-height:1.5; color:var(--ink-soft); }
ul.points li::before{ content:"\2013"; position:absolute; left:0; color:var(--blue-600); font-weight:700; }
ul.points li strong{ color:var(--navy-900); }

.card{ background:var(--blue-050); border:1px solid var(--line); padding:1.15rem 1.3rem; }
.card h4{ font-size:.92rem; text-transform:uppercase; letter-spacing:.04em; color:var(--blue-700); margin-bottom:.55rem; font-weight:700; border-bottom:1px solid var(--line); padding-bottom:.4rem; }
.card p{ font-size:1rem; color:var(--ink-soft); line-height:1.55; }
.card p + p{ margin-top:.5rem; }

.stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-top:1rem; }
.stat{ background:var(--navy-900); color:#fff; padding:1.1rem 1rem; text-align:center; }
.stat .n{ font-size:1.95rem; font-weight:700; color:var(--gold); }
.stat .l{ font-size:.8rem; letter-spacing:.02em; color:var(--blue-100); margin-top:.3rem; line-height:1.4; }

.def-grid{ display:grid; grid-template-columns:1fr 1fr; gap:1.2rem 1.8rem; }
.def{ border-left:3px solid var(--blue-500); padding-left:1rem; }
.def h4{ color:var(--navy-900); font-size:1.12rem; margin-bottom:.32rem; font-weight:700; }
.def p{ font-size:.94rem; color:var(--ink-soft); line-height:1.5; text-align:justify; }

.chart-wrap{ flex:1; display:flex; flex-direction:column; justify-content:center; }
.bar-row{ display:grid; grid-template-columns:210px 1fr 66px; align-items:center; gap:.8rem; margin-bottom:.8rem; }
.bar-row .lbl{ font-size:.94rem; color:var(--ink-soft); text-align:right; }
.bar-track{ background:var(--blue-100); height:20px; }
.bar-fill{ height:100%; background:var(--blue-600); width:0%; transition:width 1s cubic-bezier(.2,.8,.2,1); }
.bar-row .val{ font-weight:700; color:var(--navy-900); font-size:.94rem; }
.chart-source{ font-size:.9rem; color:var(--ink-soft); margin-top:.9rem; font-style:italic; line-height:1.5; border-top:1px solid var(--line); padding-top:.7rem; }

.quote-block{ border-left:3px solid var(--gold); padding-left:1.3rem; max-width:100%; }
.quote-block p{ font-size:1.12rem; color:var(--navy-900); line-height:1.58; font-style:italic; text-align:justify; }

.tbl{ width:100%; border-collapse:collapse; }
.tbl th{ background:var(--navy-900); color:#fff; text-align:left; padding:.5rem .75rem; font-size:.85rem; letter-spacing:.02em; font-weight:700; }
.tbl td{ padding:.48rem .75rem; font-size:.92rem; color:var(--ink-soft); border-bottom:1px solid var(--line); }
.tbl tr:nth-child(even) td{ background:var(--blue-050); }
.tbl td.num, .tbl th.num{ text-align:center; }
.tbl td:first-child{ color:var(--navy-900); }

.plan-list{ margin-top:.7rem; }
.plan-block{ margin-bottom:.9rem; }
.plan-block .pt-main{ font-size:1.18rem; font-weight:700; color:var(--navy-900); letter-spacing:.02em; }
.plan-sub{ margin-left:1.7rem; margin-top:.4rem; }
.plan-sub .pi{ display:flex; gap:.75rem; font-size:1.04rem; color:var(--ink-soft); margin-bottom:.32rem; }
.plan-sub .pi .rn{ color:var(--gold); font-weight:700; min-width:24px; }

.end-slide{ background:linear-gradient(150deg,var(--navy-900) 0%, var(--blue-700) 100%); text-align:center; align-items:center; }
.end-slide *{ color:#fff; }
.end-slide h2{ color:#fff; font-size:2.3rem; }
.end-slide .rule{ width:100px; height:1px; background:var(--gold); margin:1.2rem auto; }

@media print{ .nav-btn,.progress-rail,.counter{ display:none; } }
</style>

{type:"content", section:"intro", eyebrow:"Introduction", title:"Contexte général de l'étude",
 html:`<div class="body-text">
   <p>La formation des sages-femmes à l'INMeS / UAC inclut un <strong>stage communautaire de douze semaines</strong> en milieu rural, qui a révélé plusieurs problématiques de santé reproductive chez les femmes en âge de procréer.</p>
   <p>Ce constat a orienté l'étude vers l'évaluation des <strong>connaissances et pratiques d'hygiène menstruelle</strong> des femmes de 15 à 49 ans reçues à l'hôpital de zone de Savalou en 2026, dans un contexte marqué par des tabous, des inégalités de genre et un manque de ressources.</p>
 </div>
 <div class="card" style="margin-top:1rem;"><h4>Organisation du rapport</h4><p>Le document s'organise en deux parties : la première retrace les activités et compétences acquises durant les trois années de formation ; la seconde présente l'étude scientifique — méthodologie, collecte, analyse des données et résultats.</p></div>`},

{type:"content", section:"intro", eyebrow:"Introduction", title:"Cadre de l'étude : la Zone Sanitaire Savalou–Bantè",

   <p>L'Hôpital de Zone de Savalou/Bantè, établissement de première référence, regroupe gynéco-obstétrique, pédiatrie, chirurgie, laboratoire et imagerie médicale, entre autres services.</p>

 </div>`},

{type:"content", section:"I", eyebrow:"Objectifs de stage atteints", title:"Organisation des activités de stage",
 html:`<div class="body-text">
   <p>Dès l'arrivée dans le service, un planning de répartition des activités a été établi. Réparties en équipes, les stagiaires ont assuré des <strong>gardes de 24 heures suivies de 24 heures de repos</strong>, puis un système de permanence en fin de stage.</p>
   <p>Un staff matinal quotidien permettait de faire le point de la garde, sous la supervision des sages-femmes et médecins — moments enrichissants d'échange et d'apprentissage clinique.</p>
 </div>
 <div class="card" style="margin-top:1rem;"><h4>Rythme des activités</h4>

     <li>Garde en salle d'accouchement ou en hospitalisation.</li>
     <li>Visite en hospitalisation après le staff matinal, puis activités en CPN, CPoN, planification familiale.</li>
   </ul></div>`},

/* -------------------------------------------------- II. PROBLEMATIQUE - ENONCE */
{type:"content", section:"II", eyebrow:"Problématique", title:"Un enjeu de santé publique mondial et local",
 html:`<div class="body-text">
   <p>Les menstruations demeurent, dans de nombreux contextes, entourées de <strong>silence, de mythes et de tabous</strong> qui alimentent la stigmatisation et des attitudes culturelles négatives, considérant à tort les femmes réglées comme « impures ».</p>
   <p>Une gestion inappropriée de l'hygiène menstruelle expose à des infections de l'appareil reproducteur et urinaire, et affecte la confiance en soi et le bien-être psychologique.</p>
 </div>
 <div class="stat-grid">
   <div class="stat"><div class="n">800 M</div><div class="l">femmes menstruées chaque jour dans le monde</div></div>

   <div class="stat"><div class="n">11 %</div><div class="l">taux national d'abandon scolaire des filles (2012–2015)</div></div>
 </div>`},

/* -------------------------------------------------- II. PROBLEMATIQUE - CONTEXTE BENIN */
{type:"content", section:"II", eyebrow:"Problématique", title:"Le contexte béninois : des actions encore insuffisantes",
 html:`<div class="body-text">
   <p>Le Bénin, dans le souci d'atteindre l'Objectif de Développement Durable relatif à l'équité de genre, a mené plusieurs actions : séances de sensibilisation, distribution de kits d'hygiène et de serviettes réutilisables aux filles.</p>
 </div>
 <div class="card" style="margin-top:.8rem;"><h4>Actions recensées</h4>
   <ul class="points">
     <li>Distribution de 56 000 kits de gestion de l'hygiène menstruelle par l'UNICEF (2022).</li>
     <li>Sensibilisation et distribution de serviettes lavables et réutilisables dans les écoles (2022–2023).</li>
     <li>Projet d'Amélioration de l'Hygiène et de l'Assainissement dans les Écoles, avec la Fondation Claudine Talon.</li>
   </ul>
   <p style="margin-top:.6rem;">Malgré ces efforts, les connaissances et pratiques des femmes restent insuffisantes.</p></div>`},

/* -------------------------------------------------- III. DEFINITIONS I */
{type:"content", section:"III", eyebrow:"Cadre et méthode d'étude", title:"Définitions des concepts clés (1/2)",
 html:`<div class="def-grid">
   <div class="def"><h4>Hygiène menstruelle</h4><p>Usage de matériel propre, changé en toute intimité, toilette à l'eau et au savon, et accès à des installations pour l'élimination des déchets (OMS/UNICEF).</p></div>
   <div class="def"><h4>Cycle menstruel</h4><p>Cycle biologique féminin d'une durée théorique de 28 jours, du premier jour des règles au dernier jour avant les règles suivantes.</p></div>
   <div class="def"><h4>Dysménorrhée</h4><p>Douleurs pelviennes ou abdominales intenses avant ou pendant les règles, touchant 40 à 90 % des adolescentes.</p></div>
   <div class="def"><h4>Ménarche</h4><p>Survenue des toutes premières menstruations, marquant l'entrée dans la période d'activité génitale.</p></div>
 </div>`},

/* -------------------------------------------------- III. DEFINITIONS II */
{type:"content", section:"III", eyebrow:"Cadre et méthode d'étude", title:"Définitions des concepts clés (2/2)",
 html:`<div class="def-grid">
   <div class="def"><h4>Équité menstruelle</h4><p>Droit humain fondamental garantissant à toute personne réglée une gestion sûre et digne de ses règles, sans stigmatisation.</p></div>
   <div class="def"><h4>Tabou</h4><p>Interdiction sociale, morale ou culturelle empêchant l'expression libre d'un sujet jugé sensible ou gênant.</p></div>
   <div class="def"><h4>Santé menstruelle</h4><p>Va au-delà de l'hygiène : ensemble des droits et conditions pour vivre ses règles dignement et sans discrimination.</p></div>
   <div class="def"><h4>Précarité menstruelle</h4><p>Manque d'accès à des protections, à l'eau et à des infrastructures adaptées pour gérer ses menstruations.</p></div>
 </div>`},

/* -------------------------------------------------- III. REVUE LITT - CYCLE */
{type:"content", section:"III", eyebrow:"Cadre et méthode d'étude", title:"Notions de base sur le cycle menstruel",
 html:`<div class="body-text">
   <p>Le cycle menstruel regroupe l'ensemble des phénomènes physiologiques préparant l'organisme féminin à une éventuelle fécondation. Sa durée habituelle est de 28 jours, mais il peut être plus long, plus bref, ou irrégulier.</p>
   <p>Par convention, le premier jour du cycle correspond au premier jour des règles. La muqueuse utérine s'épaissit progressivement, de 0,5 mm en fin de menstruation à 5 mm au 28<sup>e</sup> jour du cycle.</p>
 </div>
 <div class="card" style="margin-top:.8rem;"><h4>Deux cycles imbriqués</h4><p>Le cycle utérin (épaississement de l'endomètre) se déroule en parallèle du cycle ovarien, au cours duquel un ovocyte mûrit en vue d'une fécondation possible. Le cycle débute à la puberté et se termine à la ménopause.</p></div>`},

{type:"content", section:"III", eyebrow:"Cadre et méthode d'étude", title:"Revue de littérature : pratiques et précarité",
 html:`<div class="body-text">
   <p>Chaque jour, un tiers des femmes dans le monde n'a pas accès à l'eau propre, à des toilettes décentes ni à des protections adaptées pour vivre cette période avec dignité.</p>
   <p>En Égypte et en Ouganda, la gestion des déchets menstruels reste insuffisante. À Kédougou (Sénégal), plus de la moitié des femmes utilisent des tissus faute de moyens, avec un risque accru d'infections.</p>

  el.className = 'slide';
  el.dataset.index = i;

  if(s.type==='cover'){ el.classList.add('slide-cover'); el.innerHTML = renderCover(); }
  else if(s.type==='title'){ el.classList.add('slide-title'); el.innerHTML = renderTitle(); }
  else if(s.type==='chart'){ el.classList.add('slide-content','framed'); el.innerHTML = cornerSet()+renderChartSlide(s); }
  else if(s.type==='content'){ el.classList.add('slide-content','framed'); el.innerHTML = cornerSet()+renderContentSlide(s); }
  else if(s.type==='end'){ el.classList.add('end-slide'); el.innerHTML = renderEnd(); }

  if(s.type==='content' || s.type==='chart'){
    pageCounter++;
    const foot = document.createElement('div');
    foot.className='slide-foot';
    foot.innerHTML = `<span>${s.section? SECTION_LABELS[s.section]: ''}</span><span class="pageno">${pageCounter} / ${pageTotal}</span>`;
    el.appendChild(foot);
  }
  deck.appendChild(el);
});

/* ============================================================
   NAVIGATION
   ============================================================ */
let current = 0;
const total = slides.length;
const els = document.querySelectorAll('.slide');
const progressBar = document.getElementById('progressBar');
const counter = document.getElementById('counter');

function animateBars(container){
  container.querySelectorAll('.bar-fill').forEach(b=>{
    const v = b.dataset.val;
    b.style.width='0%';
    requestAnimationFrame(()=> requestAnimationFrame(()=>{ b.style.width = v+'%'; }));
  });
}

function goTo(n){
  n = Math.max(0, Math.min(total-1, n));
  els[current].classList.remove('active');
  current = n;
  const el = els[current];
  el.classList.add('active');
  animateBars(el);
  progressBar.style.width = ((current+1)/total*100)+'%';
  counter.textContent = (current+1)+' / '+total;
}

document.getElementById('nextBtn').addEventListener('click', ()=>goTo(current+1));
document.getElementById('prevBtn').addEventListener('click', ()=>goTo(current-1));
window.addEventListener('keydown', e=>{
  if(['ArrowRight','PageDown',' '].includes(e.key)) goTo(current+1);
  if(['ArrowLeft','PageUp'].includes(e.key)) goTo(current-1);
  if(e.key==='Home') goTo(0);
  if(e.key==='End') goTo(total-1);
});
let touchX=null;
window.addEventListener('touchstart', e=>touchX=e.touches[0].clientX);
window.addEventListener('touchend', e=>{
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(dx<-50) goTo(current+1);
  if(dx>50) goTo(current-1);
  touchX=null;
});

goTo(0);
</script>
